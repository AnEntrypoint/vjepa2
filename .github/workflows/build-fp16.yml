name: build-fp16-ssv2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/convert_fp16.py
      - scripts/export_ssv2.py
      - .github/workflows/build-fp16.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --quiet "transformers>=4.53.0" "torch>=2.4" onnx onnxscript onnxconverter-common huggingface_hub hf_transfer

      - name: Export ViT-L fpc16 SSV2 to ONNX
        env:
          HF_HUB_ENABLE_HF_TRANSFER: '1'
        run: |
          mkdir -p models
          python scripts/export_ssv2.py
          ls -la models/

      - name: Convert to fp16
        run: |
          python scripts/convert_fp16.py
          ls -la models/

      - name: Fetch configs
        run: |
          curl -sL -o models/config.json https://huggingface.co/facebook/vjepa2-vitl-fpc16-256-ssv2/resolve/main/config.json
          curl -sL -o models/video_preprocessor_config.json https://huggingface.co/facebook/vjepa2-vitl-fpc16-256-ssv2/resolve/main/video_preprocessor_config.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-fp16-ssv2-v1
          name: V-JEPA2 ViT-L fpc16 SSV2 fp16
          body: |
            fp16 ONNX export of `facebook/vjepa2-vitl-fpc16-256-ssv2`.
            174-class Something-Something V2 head, 16 frames per clip, 256x256 input.
            Exported via the model's own `torch.onnx` export then converted with
            `onnxconverter-common.float16.convert_float_to_float16(keep_io_types=False)`.
          files: |
            models/model.fp16.onnx
            models/config.json
            models/video_preprocessor_config.json
